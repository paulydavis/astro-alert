name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Install Playwright Chromium
        run: playwright install chromium
      - name: Build
        run: pyinstaller AstroAlert.spec
      - name: Zip app bundle
        run: cd dist && zip -r AstroAlert-macOS.zip AstroAlert.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/AstroAlert-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Install Playwright Chromium
        run: playwright install chromium
      - name: Build
        run: pyinstaller AstroAlert.spec
      - name: Zip exe
        run: cd dist && Compress-Archive -Path AstroAlert.exe -DestinationPath AstroAlert-Windows.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/AstroAlert-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-tk
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium
      - name: Build
        run: pyinstaller AstroAlert.spec
      - name: Rename binary
        run: mv dist/AstroAlert dist/AstroAlert-Linux
      - name: Compress
        run: cd dist && tar -czf AstroAlert-Linux.tar.gz AstroAlert-Linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/AstroAlert-Linux.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/AstroAlert-macOS.zip
            dist/AstroAlert-Windows.zip
            dist/AstroAlert-Linux.tar.gz
